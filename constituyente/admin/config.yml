backend:
  name: github
  repo: joacog7-pixel/Constituyente  # <-- cambia esto por tu usuario/repositorio de GitHub
  branch: main

media_folder: "assets/img"
public_folder: "/assets/img"

collections:

  - name: "noticias"
    label: "Noticias"
    label_singular: "Noticia"
    description: "Feed de noticias sobre la constituyente en Colombia"
    files:
      - label: "Índice de noticias"
        name: "index"
        file: "content/noticias/index.json"
        fields:
          - label: "Noticias"
            name: "noticias"
            widget: "list"
            fields:
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Fuente (medio)", name: "fuente", widget: "string" }
              - { label: "Fecha", name: "fecha", widget: "datetime", format: "YYYY-MM-DD", date_only: true }
              - { label: "URL del artículo", name: "url", widget: "string" }
              - { label: "Resumen", name: "resumen", widget: "text" }

  - name: "blog"
    label: "Blog"
    label_singular: "Artículo"
    description: "Artículos y documentos del Comité Constituyente Republicano"
    files:
      - label: "Índice del blog"
        name: "index"
        file: "content/blog/index.json"
        fields:
          - label: "Artículos"
            name: "articulos"
            widget: "list"
            fields:
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Slug (URL)", name: "slug", widget: "string", hint: "sin espacios ni tildes, ej: republica-popular" }
              - { label: "Categoría", name: "categoria", widget: "string" }
              - { label: "Autor", name: "autor", widget: "string", default: "El Comité" }
              - { label: "Fecha", name: "fecha", widget: "datetime", format: "YYYY-MM-DD", date_only: true }
              - { label: "Resumen", name: "resumen", widget: "text" }
